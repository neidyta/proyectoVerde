<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EcoDaily</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #f5f6f7;
}

.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: linear-gradient(180deg, #1b5e20, #2e7d32);
    color: white;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    color: white;
    text-decoration: none;
}

.sidebar a.active {
    background: #4caf50;
}

/* Main */
.main {
    flex: 1;
    padding: 30px;
}

/* Card */
.card {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
    max-width: 600px;
    margin-bottom: 20px;
}

/* Inputs */
.form-group {
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 12px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1b5e20;
}

/* Lista */
.item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-bottom: 1px solid #eee;
}

.badge {
    background: #c8e6c9;
    padding: 5px 10px;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>🌱 EcoDaily</h2>
        <a href="#">Resumen</a>
        <a class="active" href="#">Mis registros</a>
        <a href="#">Resultados</a>
        <a href="#">Recomendaciones</a>
        <a href="#">Perfil</a>
    </div>

    <!-- Main -->
    <div class="main">

        <h2>Mis registros</h2>
        <p>Registra tus hábitos diarios</p>

        <div class="card">
            <form id="formulario">

                <div class="form-group">
                    <label>Tipo</label>
                    <select id="tipo">
                        <option value="transporte">Transporte</option>
                        <option value="energia">Energía</option>
                        <option value="residuos">Residuos</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Valor</label>
                    <input type="number" id="valor" placeholder="Ej: 15" required>
                </div>

                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" id="fecha" required>
                </div>

                <button type="submit">Guardar registro</button>
            </form>
        </div>

        <div class="card">
            <h3>Historial</h3>
            <ul id="lista"></ul>
        </div>

    </div>

</div>

<script>
const form = document.getElementById('formulario');
const lista = document.getElementById('lista');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const data = {
        tipo: document.getElementById('tipo').value,
        valor: Number(document.getElementById('valor').value),
        fecha: document.getElementById('fecha').value
    };

    try {
        await fetch('/api/registros', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        form.reset();
        await cargarRegistros();

    } catch (error) {
        console.error('Error:', error);
    }
});

async function cargarRegistros() {
    try {
        const res = await fetch('/api/registros');
        const data = await res.json();

        lista.innerHTML = '';

        if (data.length === 0) {
            lista.innerHTML = '<p>No hay registros aún</p>';
            return;
        }

        data.forEach(reg => {
            const li = document.createElement('li');
            li.classList.add('item');

            li.innerHTML = `
                <div>
                    <strong>${reg.tipo}</strong><br>
                    <small>${reg.fecha}</small>
                </div>
                <span class="badge">${reg.valor}</span>
            `;

            lista.appendChild(li);
        });

    } catch (error) {
        console.error('Error cargando registros:', error);
    }
}

cargarRegistros();
</script>

</body>
</html>
