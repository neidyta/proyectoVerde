<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Resultados</title>

<link rel="stylesheet" href="/style.css">

<style>

.resultado-card{

    max-width:700px;
    margin:80px auto;

    background:white;

    padding:40px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 5px 20px rgba(0,0,0,.08);

}

.valor{

    font-size:3rem;

    color:#2E7D32;

    margin:20px 0;

}

</style>

</head>

<body>


<div class="layout">

    <aside class="sidebar">

        <h2>🌱 EcoDaily</h2>

        <a href="/dashboard">🏠 Inicio</a>

    <a href="/resultados">📊 Resultados</a>

    <a href="/recomendaciones">💡 Recomendaciones</a>

    <a href="/mis-registros"> 📋 Mis Registros</a>

    <hr style="margin:30px 0; border-color:rgba(255,255,255,.2)">

    <a
        href="/"
        onclick="return confirm('¿Deseas cerrar sesión?')">
        Cerrar sesión
    </a>

</aside>

    <main class="main-content">

        <div class="card">

            <h2>Resultado de Huella Ambiental</h2>

            <div
                class="valor"
                id="puntaje">

                -

            </div>

            <h3 id="nivel">

                -

            </h3>

            <br>

            <button
            class="primary-btn"
            onclick="window.location.href='/recomendaciones'">

                Ver recomendaciones

            </button>

        </div>

    </main>

</div>

<script>

async function cargarResultado(){

    const response = await fetch(
        "/api/habitos/resultado"
    );

    const data = await response.json();

    document.getElementById("puntaje")
        .innerText = data.puntaje;

    document.getElementById("nivel")
        .innerText =
        "Huella Ambiental: " + data.nivel;

}

cargarResultado();



</script>

</body>
</html>
