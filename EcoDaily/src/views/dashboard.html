<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Dashboard</title>

<link rel="stylesheet" href="/style.css">

<style>

.dashboard{

    max-width:900px;
    margin:auto;
    padding:40px;

}

.card{

    background:white;
    padding:30px;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.form-group{

    margin-bottom:20px;

}

input,
select{

    width:100%;
    padding:12px;

    border:1px solid #ddd;

    border-radius:10px;

}

</style>

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <h2>🌱 EcoDaily</h2>

        <a href="/dashboard">🏠 Inicio</a>

    <a href="/resultados">📊 Resultados</a>

    <a href="/recomendaciones">💡 Recomendaciones</a>

    <a href="/mis-registros"> 📋 Mis Registros</a>

    <hr style="margin:30px 0; border-color:rgba(255,255,255,.2)">

    <a
        href="/"
        onclick="return confirm('¿Deseas cerrar sesión?')">
        Cerrar sesión
    </a>

</aside>

    <main class="main-content">

        <div class="card" style="margin-bottom:20px;">

    <h2 id="saludo">

        Hola!

    </h2>

    <p>
        Registra tus hábitos ambientales de hoy.
    </p>

</div>

        <div class="stats">

            <div class="stat-card">

                <h3>🌍</h3>

                <p>Impacto Ambiental</p>

            </div>

            <div class="stat-card">

                <h3>💧</h3>

                <p>Consumo de Agua</p>

            </div>

            <div class="stat-card">

                <h3>⚡</h3>

                <p>Consumo Energético</p>

            </div>

        </div>


</header>

<div class="dashboard">

    <div class="card">

        <h2>Registro de hábitos ambientales</h2>

        <br>

        <form id="habitosForm">

            <div class="form-group">

                <label>Transporte utilizado</label>

                <select id="transporte">

                    <option>Automóvil</option>
                    <option>Motocicleta</option>
                    <option>Transporte público</option>
                    <option>Bicicleta</option>
                    <option>Caminata</option>

                </select>

            </div>

            <div class="form-group">

                <label>Litros de agua diarios</label>

                <input
                type="number"
                id="agua">

            </div>

            <div class="form-group">

                <label>Consumo energético (kWh)</label>

                <input
                type="number"
                id="energia">

            </div>

            <div class="form-group">

                <label>Residuos generados (kg)</label>

                <input
                type="number"
                id="residuos">

            </div>

            <button
            type="submit"
            class="primary-btn">

                Guardar

            </button>

        </form>

        <br>

        <p id="mensaje"></p>

    </div>

</div>

<script>

const form = document.getElementById("habitosForm");

form.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const datos = {

        transporte: document.getElementById("transporte").value,

        agua: document.getElementById("agua").value,

        energia: document.getElementById("energia").value,

        residuos: document.getElementById("residuos").value

    };

    const response = await fetch(
        "/api/habitos/registrar",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(datos)
        }
    );

    const resultado = await response.json();

    document.getElementById("mensaje")
    .innerText = resultado.mensaje;

    setTimeout(() => {

    window.location.href = "/resultados";

},1000);

});

</script>

</body>
</html>
